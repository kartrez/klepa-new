name: Publish Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (optional, workflow_dispatch only)"
        required: false
        type: string
      pre_release:
        description: "Publish as VS Code Marketplace pre-release"
        required: false
        type: boolean
        default: false

concurrency:
  group: publish-extension-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    if: github.repository == 'kartrez/klepa-new'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - uses: ./.github/actions/setup-bun

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install @vscode/vsce
        run: bun install -g @vscode/vsce

      - name: Get version
        id: get-version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            current_package_version="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            current_package_version="${{ inputs.version }}"
          else
            current_package_version=$(node -p "require('./packages/kilo-vscode/package.json').version")
          fi
          echo "version=${current_package_version}" >> "$GITHUB_OUTPUT"
          echo "Version: ${current_package_version}"

      - name: Update package.json version
        working-directory: packages/kilo-vscode
        run: bun pm pkg set version=${{ steps.get-version.outputs.version }}

      - name: Setup Zig for Linux sandbox helpers
        run: |
          curl --fail --location --retry 3 \
            https://ziglang.org/download/0.14.0/zig-linux-x86_64-0.14.0.tar.xz \
            --output "$RUNNER_TEMP/zig.tar.xz"
          echo "473ec26806133cf4d1918caf1a410f8403a13d979726a9045b421b685031a982  $RUNNER_TEMP/zig.tar.xz" | sha256sum --check --status
          tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/zig-linux-x86_64-0.14.0" >> "$GITHUB_PATH"

      - name: Build CLI
        run: bun packages/opencode/script/build.ts
        env:
          KILO_VERSION: ${{ steps.get-version.outputs.version }}

      - name: Build VSIX packages
        working-directory: packages/kilo-vscode
        run: bun script/build.ts
        env:
          CLI_DIST_DIR: ../../packages/opencode/dist
          KILO_VERSION: ${{ steps.get-version.outputs.version }}
          KILO_PRE_RELEASE: ${{ inputs.pre_release && 'true' || 'false' }}

      - name: Publish to VS Code Marketplace
        working-directory: packages/kilo-vscode
        env:
          VSCE_PAT: ${{ secrets.VSCODE_MARKETPLACE_TOKEN }}
          KILO_PRE_RELEASE: ${{ inputs.pre_release && 'true' || 'false' }}
        run: bun script/publish-extension.ts
